<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>404 — Страница бастует | TransLingo</title>
    <link rel="icon" type="image/png" href="images/logo123.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F0F4FF 0%, #E8EDF8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0 auto;
        }

        .container {
            max-width: 750px;
            width: 100%;
            padding: 40px;
        }

        .protest-card {
            background: rgba(255,255,255,0.98);
            border-radius: 64px;
            padding: 55px 45px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card-header {
            text-align: center;
        }

        .mood-emoji {
            font-size: 70px;
            display: inline-block;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC, #00D4FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 10px;
            letter-spacing: 12px;
        }

        .subtitle {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .speech-bubble {
            background: linear-gradient(135deg, #F8FAFF, #F0F4FF);
            border-radius: 40px;
            padding: 28px 24px;
            margin: 30px 0;
            color: #1A1A1A;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(42,109,255,0.2);
        }

        .progress-section {
            margin: 25px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #E5E7EB;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2A6DFF, #00D4FF);
            border-radius: 20px;
            transition: width 0.5s;
        }

        .plea-input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 80px;
            border: 2px solid #E5E7EB;
            font-size: 16px;
            font-family: inherit;
            background: white;
        }

        .plea-input:focus {
            outline: none;
            border-color: #2A6DFF;
        }

        .btn-plea {
            width: 100%;
            margin-top: 16px;
            padding: 16px 28px;
            border-radius: 80px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC);
            color: white;
        }

        .btn-plea:hover {
            transform: translateY(-2px);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #F0F2F5;
            border-bottom: 1px solid #F0F2F5;
        }

        .attempt-counter {
            font-size: 14px;
            font-weight: 600;
            color: #2A6DFF;
            background: #F0F4FF;
            padding: 8px 18px;
            border-radius: 40px;
        }

        .response-message {
            font-size: 14px;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 25px;
            flex-direction: column;
            align-items: center;
        }

        .btn-back {
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC);
            border: none;
            color: white;
            width: auto;
            min-width: 220px;
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        .btn-complaint {
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: 2px solid #EF4444;
            color: #EF4444;
        }

        .btn-complaint:hover {
            background: #EF4444;
            color: white;
        }

        .secret-tip {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #9CA3AF;
            cursor: pointer;
        }

        .secret-tip:hover {
            color: #2A6DFF;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="protest-card">
            <div class="card-header">
                <div class="mood-emoji" id="moodEmoji">😤</div>
                <div class="error-code">404</div>
                <div class="subtitle">Страница потерялась в переводе</div>
            </div>

            <div class="speech-bubble" id="speechBubble">
                "Я НЕ БУДУ ПЕРЕВОДИТЬСЯ!"
            </div>

            <div class="progress-section">
                <div class="progress-label">
                    <span>✨ Прогресс примирения</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" class="plea-input" id="pleaInput" placeholder='Например: "пожалуйста, вернись" или "умоляю"'>
                <button class="btn-plea" id="pleaBtn">🙏 Уговорить страницу</button>
            </div>

            <div class="stats-row">
                <div class="attempt-counter" id="attemptCounter">🔥 0 / 5 попыток</div>
                <div id="responseMessage" class="response-message" style="color: #6B7280;">💬 Напиши "пожалуйста"...</div>
            </div>

            <div class="button-group">
                <div id="backBtnWrapper" style="width: 100%; text-align: center; margin-bottom: 15px;">
                    <button class="btn-back hidden" id="backBtn">🏠 Вернуться на главную</button>
                </div>
                <button class="btn-complaint" id="complaintBtn">✍️ Пожаловаться</button>
            </div>

            <div class="secret-tip" id="secretTip">💡 Напиши "пожалуйста" 5 раз, и страница сдастся</div>
        </div>
    </div>

    <script>
        let attempts = 0;
        const MAX_ATTEMPTS = 5;

        const elements = {
            progressFill: document.getElementById('progressFill'),
            progressPercent: document.getElementById('progressPercent'),
            attemptCounter: document.getElementById('attemptCounter'),
            responseMessage: document.getElementById('responseMessage'),
            moodEmoji: document.getElementById('moodEmoji'),
            speechBubble: document.getElementById('speechBubble'),
            backBtn: document.getElementById('backBtn'),
            pleaBtn: document.getElementById('pleaBtn'),
            pleaInput: document.getElementById('pleaInput'),
            complaintBtn: document.getElementById('complaintBtn'),
            secretTip: document.getElementById('secretTip')
        };

        function updateUI() {
            const percent = (attempts / MAX_ATTEMPTS) * 100;
            if (elements.progressFill) elements.progressFill.style.width = percent + '%';
            if (elements.progressPercent) elements.progressPercent.innerHTML = Math.floor(percent) + '%';
            if (elements.attemptCounter) elements.attemptCounter.innerHTML = '🔥 ' + attempts + ' / 5 попыток';

            if (attempts === MAX_ATTEMPTS) {
                if (elements.moodEmoji) elements.moodEmoji.innerHTML = '😌';
                if (elements.speechBubble) elements.speechBubble.innerHTML = '"Ты серьёзно? Ладно... забирай кнопку!"';
                if (elements.responseMessage) {
                    elements.responseMessage.innerHTML = '🎉 Страница сдалась! Кнопка появилась!';
                    elements.responseMessage.style.color = '#10B981';
                }
                if (elements.backBtn) {
                    elements.backBtn.classList.remove('hidden');
                }
            } else if (attempts > 0) {
                const angryMessages = ['НЕТ. И НЕ ПРОСИ.', 'ТЫ ЧЁ, НЕ СЛЫШИШЬ? НЕТ!', 'ПЕРЕСТАНЬ! Я УХОЖУ...', 'ТЫ МЕНЯ ЗАДОЛБАЛ(А)...'];
                const angryEmojis = ['😤', '😠', '😫', '😩'];
                if (elements.moodEmoji) elements.moodEmoji.innerHTML = angryEmojis[attempts - 1];
                if (elements.speechBubble) elements.speechBubble.innerHTML = '"' + angryMessages[attempts - 1] + '"';
            }
        }

        function checkPlea(msg) {
            const keywords = ['пожалуйста', 'умоляю', 'прошу', 'please', 'pls', 'ну пожалуйста'];
            return keywords.some(k => msg.toLowerCase().includes(k));
        }

        if (elements.pleaBtn) {
            elements.pleaBtn.onclick = function() {
                const plea = elements.pleaInput ? elements.pleaInput.value.trim() : '';
                
                if (!plea) {
                    if (elements.responseMessage) {
                        elements.responseMessage.innerHTML = '😒 Страница не заметила попытку...';
                        elements.responseMessage.style.color = '#EF4444';
                    }
                    setTimeout(() => {
                        if (elements.responseMessage && attempts < MAX_ATTEMPTS) {
                            elements.responseMessage.innerHTML = '💬 Напиши "пожалуйста"...';
                            elements.responseMessage.style.color = '#6B7280';
                        }
                    }, 2000);
                    return;
                }

                const isGood = checkPlea(plea);

                if (!isGood && attempts < MAX_ATTEMPTS) {
                    if (elements.responseMessage) {
                        elements.responseMessage.innerHTML = '🙄 Напишите "пожалуйста" или "умоляю"!';
                        elements.responseMessage.style.color = '#EF4444';
                    }
                    if (elements.moodEmoji) elements.moodEmoji.innerHTML = '😤';
                    if (elements.speechBubble) elements.speechBubble.innerHTML = '"НЕПРАВИЛЬНОЕ СЛОВО!"';
                    if (elements.pleaInput) elements.pleaInput.value = '';
                    setTimeout(() => {
                        if (elements.responseMessage && attempts < MAX_ATTEMPTS) {
                            elements.responseMessage.innerHTML = '💬 Напиши "пожалуйста"...';
                            elements.responseMessage.style.color = '#6B7280';
                        }
                        if (elements.speechBubble && attempts < MAX_ATTEMPTS) {
                            elements.speechBubble.innerHTML = '"Я НЕ БУДУ ПЕРЕВОДИТЬСЯ!"';
                        }
                    }, 2000);
                    return;
                }

                if (attempts >= MAX_ATTEMPTS) {
                    if (elements.responseMessage) {
                        elements.responseMessage.innerHTML = '🔓 Кнопка уже доступна! Нажми "Вернуться на главную"';
                        elements.responseMessage.style.color = '#10B981';
                    }
                    return;
                }

                attempts++;
                updateUI();

                if (attempts < MAX_ATTEMPTS) {
                    if (elements.responseMessage) {
                        elements.responseMessage.innerHTML = 'Попытка ' + attempts + '/' + MAX_ATTEMPTS;
                        elements.responseMessage.style.color = '#2A6DFF';
                    }
                    setTimeout(() => {
                        if (elements.responseMessage && attempts < MAX_ATTEMPTS) {
                            elements.responseMessage.innerHTML = '💬 Продолжай уговаривать...';
                            elements.responseMessage.style.color = '#6B7280';
                        }
                    }, 2000);
                }
                
                if (elements.pleaInput) elements.pleaInput.value = '';
            };
        }

        if (elements.complaintBtn) {
            elements.complaintBtn.onclick = function() {
                alert('📝 Жалоба отправлена. Страница её проигнорировала 😅');
            };
        }

        if (elements.backBtn) {
            elements.backBtn.onclick = function() {
                window.location.href = 'index.html';
            };
        }

        if (elements.secretTip) {
            elements.secretTip.onclick = function() {
                alert('🤫 Секрет: Напиши "пожалуйста" 5 раз!');
            };
        }

        if (elements.pleaInput) {
            elements.pleaInput.onkeypress = function(e) {
                if (e.key === 'Enter') {
                    if (elements.pleaBtn) elements.pleaBtn.click();
                }
            };
        }
    </script>
</body>
</html>
