<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>404 — Страница бастует | TransLingo</title>
    <link rel="icon" type="image/png" href="images/logo123.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F0F4FF 0%, #E8EDF8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1920px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(42,109,255,0.05), rgba(0,212,255,0.05));
            border-radius: 50%;
            filter: blur(60px);
        }

        .shape-1 { width: 500px; height: 500px; top: -200px; right: -100px; }
        .shape-2 { width: 400px; height: 400px; bottom: -150px; left: -100px; }
        .shape-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .container {
            max-width: 750px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .protest-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 64px;
            padding: 55px 45px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2), 0 0 0 1px rgba(42,109,255,0.1) inset;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card-header {
            text-align: center;
            position: relative;
        }

        .mood-emoji {
            font-size: 70px;
            display: inline-block;
            animation: moodFloat 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(42,109,255,0.2));
        }

        @keyframes moodFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC, #00D4FF);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 10px;
            letter-spacing: 12px;
            animation: gradientShift 3s infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .speech-bubble {
            background: linear-gradient(135deg, #F8FAFF, #F0F4FF);
            border-radius: 40px;
            padding: 28px 24px;
            margin: 30px 0;
            position: relative;
            color: #1A1A1A;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(42,109,255,0.2);
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            border: 12px solid transparent;
            border-bottom-color: #F0F4FF;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            border: 13px solid transparent;
            border-bottom-color: rgba(42,109,255,0.2);
            z-index: -1;
        }

        .bubble-icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .progress-section {
            margin: 25px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #E5E7EB;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2A6DFF, #00D4FF);
            border-radius: 20px;
            transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .input-group {
            margin: 30px 0;
        }

        .plea-input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 80px;
            border: 2px solid #E5E7EB;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .plea-input:focus {
            outline: none;
            border-color: #2A6DFF;
            box-shadow: 0 0 0 4px rgba(42,109,255,0.1);
            transform: translateY(-2px);
        }

        .plea-input::placeholder {
            color: #9CA3AF;
        }

        .btn-plea {
            width: 100%;
            margin-top: 16px;
            padding: 16px 28px;
            border-radius: 80px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-plea:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(42,109,255,0.35);
        }

        .btn-plea:active {
            transform: translateY(0);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #F0F2F5;
            border-bottom: 1px solid #F0F2F5;
        }

        .attempt-counter {
            font-size: 14px;
            font-weight: 600;
            color: #2A6DFF;
            background: #F0F4FF;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .response-message {
            font-size: 14px;
            color: #10B981;
            font-weight: 500;
            transition: all 0.3s;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 25px;
        }

        .btn-back {
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #2A6DFF, #1A4FCC);
            border: none;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(42,109,255,0.3);
        }

        .btn-complaint {
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: 2px solid #EF4444;
            color: #EF4444;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-complaint:hover {
            background: #EF4444;
            color: white;
            transform: translateY(-3px);
        }

        .btn-back {
            display: inline-flex;
        }

        .secret-tip {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #9CA3AF;
            opacity: 0.6;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        .secret-tip:hover {
            opacity: 1;
            color: #2A6DFF;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1F2937;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        @keyframes bounceReveal {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-back.revealed {
            animation: bounceReveal 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="container">
        <div class="protest-card">
            <div class="card-header">
                <div class="mood-emoji" id="moodEmoji">😤</div>
                <div class="error-code">404</div>
                <div class="subtitle">Страница потерялась в переводе</div>
            </div>

            <div class="speech-bubble" id="speechBubble">
                <span class="bubble-icon">🗣️</span> "Я НЕ БУДУ ПЕРЕВОДИТЬСЯ!"
            </div>

            <div class="progress-section">
                <div class="progress-label">
                    <span>✨ Прогресс примирения</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" class="plea-input" id="pleaInput" placeholder='Например: "пожалуйста, вернись" или "умоляю"' autocomplete="off">
                <button class="btn-plea" id="pleaBtn">
                    <span>🙏</span> Уговорить страницу
                </button>
            </div>

            <div class="stats-row">
                <div class="attempt-counter" id="attemptCounter">
                    🔥 0 / 5 попыток
                </div>
                <div id="responseMessage" class="response-message">
                    💬 Напиши "пожалуйста"...
                </div>
            </div>

            <div class="button-group">
                <button class="btn-back" id="backBtn" style="display: none;">
                    <span>🏠</span> Вернуться на главную
                </button>
                <button class="btn-complaint" id="complaintBtn">
                    <span>✍️</span> Пожаловаться
                </button>
            </div>

            <div class="complaint-box" id="complaintBox">
                📝 Жалоба отправлена. Страница её проигнорировала 😅
            </div>

            <div class="secret-tip" id="secretTip">
                💡 Напиши "пожалуйста" 5 раз, и страница сдастся
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let attempts = 0;
        const MAX_ATTEMPTS = 5;

        const angryResponses = [
            { text: "НЕТ. И НЕ ПРОСИ.", emoji: "😤" },
            { text: "ТЫ ЧЁ, НЕ СЛЫШИШЬ? НЕТ!", emoji: "😠" },
            { text: "ПЕРЕСТАНЬ! Я УХОЖУ...", emoji: "😫" },
            { text: "ТЫ МЕНЯ ЗАДОЛБАЛ(А)...", emoji: "😩" },
            { text: "ЛАДНО... ВОТ ТВОЯ КНОПКА, УХОДИ!", emoji: "😒" }
        ];

        const friendlyResponses = [
            { text: "Хм... попробуй ещё", emoji: "🤔" },
            { text: "Нууу... не знаю...", emoji: "😐" },
            { text: "Ещё чуть-чуть...", emoji: "🙄" },
            { text: "Почти... ещё немного усилий", emoji: "😅" },
            { text: "Ты серьёзно? Ладно... забирай кнопку!", emoji: "😌" }
        ];

        const pleaKeywords = ['пожалуйста', 'умоляю', 'прошу', 'please', 'pls', 'ну пожалуйста', 'сделай милость', 'будь добра', 'будь любезен'];

        function showToast(message, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isSuccess ? '#10B981' : '#1F2937';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function updateProgress() {
            const percent = (attempts / MAX_ATTEMPTS) * 100;
            const fill = document.getElementById('progressFill');
            const percentSpan = document.getElementById('progressPercent');
            const counter = document.getElementById('attemptCounter');
            if (fill) fill.style.width = percent + '%';
            if (percentSpan) percentSpan.innerHTML = Math.floor(percent) + '%';
            if (counter) counter.innerHTML = '🔥 ' + attempts + ' / 5 попыток';
        }

        function updateMoodAndBubble(message, emoji) {
            const bubble = document.getElementById('speechBubble');
            const moodEmoji = document.getElementById('moodEmoji');
            
            if (moodEmoji) {
                moodEmoji.style.transform = 'scale(1.1)';
                setTimeout(() => { 
                    if (moodEmoji) moodEmoji.style.transform = 'scale(1)'; 
                }, 200);
                moodEmoji.innerHTML = emoji;
            }
            
            if (bubble) {
                bubble.style.opacity = '0';
                bubble.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    bubble.innerHTML = '<span class="bubble-icon">🗣️</span> "' + message + '"';
                    bubble.style.opacity = '1';
                    bubble.style.transform = 'scale(1)';
                }, 150);
            }
        }

        function checkPleaMessage(message) {
            const lowerMsg = message.toLowerCase();
            return pleaKeywords.some(keyword => lowerMsg.includes(keyword));
        }

        const pleaBtn = document.getElementById('pleaBtn');
        const pleaInput = document.getElementById('pleaInput');
        const responseDiv = document.getElementById('responseMessage');
        const backBtn = document.getElementById('backBtn');

        if (pleaBtn) {
            pleaBtn.addEventListener('click', function() {
                const plea = pleaInput.value.trim();
                
                if (!plea) {
                    if (responseDiv) {
                        responseDiv.innerHTML = '😒 Страница даже не заметила попытку...';
                        responseDiv.style.color = '#EF4444';
                    }
                    setTimeout(() => {
                        if (responseDiv && attempts < MAX_ATTEMPTS) {
                            responseDiv.innerHTML = '💬 Напиши "пожалуйста"...';
                            responseDiv.style.color = '#6B7280';
                        }
                    }, 2000);
                    return;
                }

                const isGoodPlea = checkPleaMessage(plea);

                if (!isGoodPlea && attempts < MAX_ATTEMPTS) {
                    if (responseDiv) {
                        responseDiv.innerHTML = '🙄 Страница требует вежливости! Напишите "пожалуйста" или "умоляю"';
                        responseDiv.style.color = '#EF4444';
                    }
                    updateMoodAndBubble("НЕПРАВИЛЬНОЕ СЛОВО!", "😤");
                    pleaInput.value = '';
                    setTimeout(() => {
                        if (responseDiv && attempts < MAX_ATTEMPTS) {
                            responseDiv.innerHTML = '💬 Напиши "пожалуйста"...';
                            responseDiv.style.color = '#6B7280';
                        }
                    }, 2000);
                    return;
                }

                if (attempts >= MAX_ATTEMPTS) {
                    if (responseDiv) {
                        responseDiv.innerHTML = '🔓 Кнопка уже доступна! Нажми "Вернуться на главную"';
                        responseDiv.style.color = '#10B981';
                    }
                    return;
                }

                attempts++;
                updateProgress();

                if (attempts === MAX_ATTEMPTS) {
                    updateMoodAndBubble(friendlyResponses[4].text, friendlyResponses[4].emoji);
                    if (responseDiv) {
                        responseDiv.innerHTML = '🎉 Страница сдалась! Кнопка появилась!';
                        responseDiv.style.color = '#10B981';
                    }
                    showToast('✅ Кнопка разблокирована!', true);
                    
                    if (backBtn) {
                        backBtn.style.display = 'inline-flex';
                        backBtn.classList.add('revealed');
                    }
                    
                    setTimeout(() => {
                        if (responseDiv) {
                            responseDiv.innerHTML = '🏠 Нажми на кнопку, чтобы вернуться';
                        }
                    }, 3000);
                } else {
                    updateMoodAndBubble(angryResponses[attempts - 1].text, angryResponses[attempts - 1].emoji);
                    if (responseDiv) {
                        responseDiv.innerHTML = friendlyResponses[attempts - 1].text;
                        responseDiv.style.color = '#2A6DFF';
                    }
                    showToast('Попытка ' + attempts + '/' + MAX_ATTEMPTS, false);
                    setTimeout(() => {
                        if (responseDiv && attempts < MAX_ATTEMPTS) {
                            responseDiv.innerHTML = '💬 Продолжай уговаривать...';
                            responseDiv.style.color = '#6B7280';
                        }
                    }, 2500);
                }

                pleaInput.value = '';
                pleaInput.focus();
            });
        }

        const complaintBtn = document.getElementById('complaintBtn');
        if (complaintBtn) {
            complaintBtn.addEventListener('click', function() {
                const box = document.getElementById('complaintBox');
                if (box) box.style.display = 'block';
                showToast('📝 Жалоба отправлена (бесполезно)', false);
                setTimeout(() => {
                    if (box) box.style.display = 'none';
                }, 3000);
            });
        }

        if (backBtn) {
            backBtn.addEventListener('click', function() {
                window.location.href = 'site.html';
            });
        }

        if (pleaInput) {
            pleaInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const btn = document.getElementById('pleaBtn');
                    if (btn) btn.click();
                }
            });
        }

        const secretTip = document.getElementById('secretTip');
        if (secretTip) {
            secretTip.addEventListener('click', function() {
                showToast('🤫 Секрет: Напиши "пожалуйста" 5 раз!', false);
            });
        }
    </script>
</body>
</html>
